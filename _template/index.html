<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prototype Name — DripJobs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-primary:        #8B85EA;
    --color-primary-hover:  #736BE3;
    --color-primary-active: #5C53DC;
    --color-primary-rgb:    139, 133, 234;
    --color-bg:             #F3F1FC;
    --color-text:           #32415B;
    --color-text-muted:     #80879A;
    --color-border:         #DAD8E3;
    --color-card:           #FFFFFF;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .proto-bar {
    background: var(--color-card);
    border-bottom: 1px solid var(--color-border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .proto-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .back-link {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--color-primary); }
  .divider { color: var(--color-border); font-size: 16px; }
  .proto-bar-title { font-size: 14px; font-weight: 600; }
  .proto-bar-ticket {
    font-size: 11px;
    font-weight: 600;
    color: var(--color-primary);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid #D6D2F5;
    background: #E8E6FA;
    border-radius: 999px;
    letter-spacing: 0.2px;
  }
  .proto-bar-ticket:hover { background: var(--color-primary); color: #fff; }

  /* ── Prototype content area ── */
  .proto-content {
    max-width: 960px;
    margin: 32px auto;
    padding: 0 24px;
  }

  /* ── Placeholder message ── */
  .proto-placeholder {
    background: var(--color-card);
    border: 2px dashed var(--color-border);
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
  }
  .proto-placeholder-icon { font-size: 40px; margin-bottom: 12px; }
  .proto-placeholder h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .proto-placeholder p  { font-size: 13px; color: var(--color-text-muted); line-height: 1.6; max-width: 420px; margin: 0 auto; }

  .proto-placeholder code {
    display: inline-block;
    background: #F3F1FC;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--color-primary-active);
    margin-top: 16px;
  }

  /* ── Section card (reuse these in your prototype) ── */
  .section-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .section-subtitle {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: -10px;
    margin-bottom: 14px;
  }

  /* ── Button helpers ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-decoration: none;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary  { background: var(--color-primary); color: #fff; }
  .btn-primary:hover { background: var(--color-primary-hover); }
  .btn-outline  { background: transparent; border: 1px solid var(--color-border); color: var(--color-text-muted); }
  .btn-outline:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .btn-sm { height: 30px; padding: 0 14px; border-radius: 8px; font-size: 12px; }
</style>
</head>
<body>

<!-- Top bar — update PROTOTYPE NAME and TICKET ID -->
<div class="proto-bar">
  <div class="proto-bar-left">
    <a class="back-link" href="../index.html">← Hub</a>
    <span class="divider">|</span>
    <span class="proto-bar-title">PROTOTYPE NAME</span>
  </div>
  <a class="proto-bar-ticket" href="https://app.clickup.com/t/TICKET-ID" target="_blank">TICKET-ID</a>
</div>

<!-- Prototype content — replace the placeholder below with your actual prototype HTML -->
<div class="proto-content">

  <div class="proto-placeholder">
    <div class="proto-placeholder-icon">🛠️</div>
    <h2>Prototype goes here</h2>
    <p>Replace this placeholder with your prototype HTML. Use the <code>.section-card</code> pattern and the CSS variables above to stay on-brand automatically.</p>
    <code>_template/index.html</code>
  </div>

  <!--
  ═══════════════════════════════════════════════
  STARTER SECTION CARD — copy/paste and modify
  ═══════════════════════════════════════════════

  <div class="section-card">
    <div class="section-title">Section Title</div>
    <div class="section-subtitle">Optional subtitle</div>

    Add your prototype content here.

    <div style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-outline">Cancel</button>
      <button class="btn btn-primary">Save</button>
    </div>
  </div>
  -->

</div>

</body>
</html>
