<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DripJobs Weekly Product Update</title>
<style>
  :root{
    --purple-deep:#5B1A96;
    --purple:#6B21A8;
    --purple-med:#9333EA;
    --purple-light:#DDD6FE;
    --purple-wash:#F6F1FC;
    --ink:#1E1530;
    --ink-soft:#5B5468;
    --line:#E7DFF5;
    --amber:#B45309;
    --amber-wash:#FEF3E2;
    --green:#15803D;
    --green-wash:#EAFBF1;
    --white:#FFFFFF;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);
    background:var(--white);
    line-height:1.55;
  }
  a{color:var(--purple-med);}

  /* ---------- HERO ---------- */
  .hero{
    background:linear-gradient(135deg,var(--purple-deep) 0%,var(--purple) 55%,var(--purple-med) 100%);
    color:#fff;
    padding:64px 24px 56px;
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute;
    top:-120px; right:-120px;
    width:380px; height:380px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .hero::after{
    content:"";
    position:absolute;
    bottom:-160px; left:-80px;
    width:320px; height:320px;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .hero-inner{
    max-width:780px;
    margin:0 auto;
    position:relative;
    z-index:2;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.28);
    color:#fff;
    font-size:13px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:22px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#fff;display:inline-block;}
  .hero h1{
    font-size:38px;
    font-weight:800;
    margin:0 0 10px;
    letter-spacing:-0.02em;
  }
  .hero .subdate{
    font-size:16px;
    font-weight:600;
    color:rgba(255,255,255,0.85);
    margin:0;
  }

  /* ---------- BODY ---------- */
  .wrap{
    max-width:780px;
    margin:0 auto;
    padding:48px 24px 80px;
  }
  .section-label{
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--purple-med);
    margin-bottom:14px;
  }
  .placeholder-card{
    border:1px dashed var(--line);
    background:var(--purple-wash);
    border-radius:var(--radius);
    padding:32px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
  }
  .placeholder-card strong{
    display:block;
    color:var(--ink);
    font-size:16px;
    margin-bottom:6px;
  }
  .footer-note{
    margin-top:40px;
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="hero-inner">
      <span class="eyebrow"><span class="dot"></span>DripJobs Product</span>
      <h1>Weekly Product Update</h1>
      <p class="subdate">Jun 30 &ndash; Jul 4, 2026</p>
    </div>
  </div>

  <div class="wrap">
    <div class="section-label">This Week</div>
    <div class="placeholder-card">
      <strong>Content pending</strong>
      This week's shipped items, fixes, and notes have not been added yet. Replace this section with the week's summary before sharing.
    </div>
    <div class="footer-note">Refreshed weekly by the DripJobs Product team.</div>
  </div>

</body>
</html>
